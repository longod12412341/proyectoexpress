<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tu Carrito</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F5F0E8;
      --surface:  #FFFDF7;
      --border:   #E2D9C8;
      --text:     #1A1612;
      --muted:    #8A7F72;
      --accent:   #2D6A4F;
      --danger:   #C0392B;
      --radius:   12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
    }

    header button {
      font-size: 0.85rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }

    .contenedor {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.25rem;
      margin-bottom: 16px;
    }

    .carrito-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .carrito-vacio {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 32px 0;
    }

    .carrito-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .carrito-item:last-of-type { border-bottom: none; }

    .item-info { flex: 1; }

    .item-nombre { font-weight: 500; font-size: 0.9rem; }

    .item-detalle {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .cantidad-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-cant {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .btn-cant:hover { background: var(--border); }

    .item-subtotal {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--accent);
      white-space: nowrap;
      min-width: 70px;
      text-align: right;
    }

    .btn-remove {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      color: var(--danger);
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 600;
    }

    .btn-remove:hover { background: #fdecea; }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      margin-top: 8px;
      border-top: 2px solid var(--text);
    }

    .total-label {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
    }

    .total-valor {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--accent);
    }

    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #fff;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }
  </style>
</head>
<body>

<header>
  <h1>Compras Gamer</h1>
  <button onclick="window.location.href='index.html'">← Ver productos</button>
</header>

<div class="contenedor">
  <p class="section-title">Tu carrito</p>
  <div class="carrito-panel">
    <div id="carrito-items">
      <p class="carrito-vacio">Cargando carrito...</p>
    </div>
    <div class="total-row" id="total-row" style="display:none;">
      <span class="total-label">Total</span>
      <span class="total-valor" id="total-valor">$0</span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  function formatPrecio(n) {
    return '$' + Number(n).toLocaleString('es-AR');
  }

  function toast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (isError ? ' error' : '');
    setTimeout(() => t.className = '', 2500);
  }

  async function cargarCarrito() {
    try {
      const [resItems, resTotal] = await Promise.all([
        fetch('/carrito'),
        fetch('/carrito/total')
      ]);

      const items = await resItems.json();
      const total = await resTotal.json();

      const contenedor = document.getElementById('carrito-items');
      const totalRow   = document.getElementById('total-row');

      if (items.length === 0) {
        contenedor.innerHTML = '<p class="carrito-vacio">El carrito está vacío</p>';
        totalRow.style.display = 'none';
        return;
      }

      contenedor.innerHTML = items.map(item => `
        <div class="carrito-item">
          <div class="item-info">
            <p class="item-nombre">${item.nombre}</p>
            <p class="item-detalle">${formatPrecio(item.precio)} c/u</p>
          </div>
          <div class="cantidad-controls">
            <button class="btn-cant" onclick="decrementar('${item.producto_id}')">−</button>
            <span>${item.cantidad}</span>
            <button class="btn-cant" onclick="incrementar('${item.producto_id}')">+</button>
          </div>
          <span class="item-subtotal">${formatPrecio(item.precio * item.cantidad)}</span>
          <button class="btn-remove" onclick="eliminarDelCarrito('${item.producto_id}')">✕</button>
        </div>`).join('');

      document.getElementById('total-valor').textContent = formatPrecio(total.total);
      totalRow.style.display = 'flex';

    } catch {
      toast('Error al cargar el carrito', true);
    }
  }

  async function incrementar(productoId) {
    const res = await fetch('/carrito', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ producto_id: productoId, cantidad: 1 })
    });

    if (!res.ok) {
      toast('Error al actualizar cantidad', true);
      return;
    }
    cargarCarrito();
  }

  async function decrementar(productoId) {
  const res = await fetch(`/carrito/${productoId}/decrementar`, { method: 'POST' });

  if (!res.ok) {
    toast('Error al actualizar cantidad', true);
    return;
  }
  cargarCarrito();
}

  async function eliminarDelCarrito(productoId) {
    const res = await fetch(`/carrito/${productoId}`, { method: 'DELETE' });

    if (!res.ok) {
      toast('Error al eliminar', true);
      return;
    }
    toast('Producto eliminado del carrito');
    cargarCarrito();
  }

  cargarCarrito();
</script>

</body>
</html>
